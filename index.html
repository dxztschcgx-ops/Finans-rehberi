<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rove Finance - Premium Rehber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- HEADER -->
    <header class="p-6 flex justify-between items-center max-w-6xl w-full mx-auto">
        <div class="text-2xl font-black tracking-widest text-white">ROVE & CO.</div>
        <div id="auth-status-area">
            <button onclick="toggleModal('auth-modal')" class="bg-white text-slate-950 font-bold px-5 py-2 rounded-full text-sm hover:bg-slate-200 transition">Giriş Yap</button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-4xl mx-auto px-6 text-center py-12 flex-grow flex flex-col justify-center items-center">
        <h1 class="text-4xl md:text-6xl font-extrabold text-white tracking-tight mb-6">Finansal İmparatorluğunu İnşa Et</h1>
        <p class="text-slate-400 text-lg mb-8">Rove & Co. rehber serisi.</p>
        
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-left shadow-2xl">
            <!-- KAPAK -->
            <div class="h-48 relative rounded-xl mb-4 overflow-hidden border border-slate-700">
                <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-black"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div class="w-16 h-16 border-2 border-slate-700 rounded-full flex items-center justify-center mb-2">R&C</div>
                </div>
            </div>
            <h3 class="text-lg font-bold text-white">Finansal Okuryazarlık Rehberi</h3>
            <button onclick="openBook()" class="w-full bg-slate-800 hover:bg-slate-700 mt-4 py-2.5 rounded-xl text-sm transition">İncele</button>
        </div>
    </main>

    <!-- GİRİŞ MODAL -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white text-slate-900 p-8 rounded-2xl max-w-md w-full">
            <h2 class="text-xl font-bold mb-4">Giriş Yap</h2>
            <input type="email" id="email" placeholder="E-posta" class="w-full border p-3 rounded-xl mb-3">
            <input type="password" id="pass" placeholder="Şifre" class="w-full border p-3 rounded-xl mb-3">
            <button onclick="login()" class="w-full bg-slate-950 text-white py-3 rounded-xl font-bold">Giriş Yap</button>
        </div>
    </div>

    <!-- KİTAP MODAL -->
    <div id="book-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto">
            <button onclick="toggleModal('book-modal')" class="text-white float-right">Kapat</button>
            <div id="book-content"></div>
        </div>
    </div>

    <script>
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function login() {
            localStorage.setItem('user', JSON.stringify({role: 'user'}));
            toggleModal('auth-modal');
            alert("Giriş başarılı!");
        }

        function openBook() {
            const user = localStorage.getItem('user');
            if (!user) { toggleModal('auth-modal'); return; }
            
            document.getElementById('book-content').innerHTML = `
                <h4 class="text-amber-500 font-bold mb-4">📌 İÇİNDEKİLER (Özet)</h4>
                <ul class="text-slate-300 space-y-2">
                    <li>Bölüm 1-4: Temeller ve Borsa</li>
                    <li>Bölüm 5-8: Kripto ve Girişimcilik</li>
                    <li>Bölüm 9-12: Vergi ve Final</li>
                </ul>
                <a href="https://shopier.com" class="block bg-amber-500 text-center py-3 mt-6 rounded-xl font-bold">SATIN AL</a>
            `;
            toggleModal('book-modal');
        }
    </script>
</body>
</html>
