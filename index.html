<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistemik Sermaye</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b1020;
color:white;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */
.video-bg{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.35) contrast(1.1);
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:radial-gradient(circle at top, rgba(30,58,138,0.4), rgba(11,16,32,0.95));
z-index:-1;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
font-weight:800;
letter-spacing:-2px;
}

.hero p{
margin-top:15px;
font-size:20px;
color:#cbd5e1;
min-height:30px;
}

.btn{
margin-top:30px;
padding:14px 28px;
background:linear-gradient(135deg,#38bdf8,#2563eb);
border:none;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

section{
padding:100px 20px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:16px;
backdrop-filter:blur(10px);
}

h2{color:#38bdf8;margin-bottom:20px;}

.cta{
text-align:center;
padding:120px 20px;
}

</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-working-from-home-1579/1080p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero">
<h1>Sistemik Sermaye</h1>
<p id="dynamicText">Parayı değil, sistemi öğren.</p>
<button class="btn">Kitabı İncele</button>
</div>

<section>
<h2>Problem</h2>
<div class="card">
Çoğu insan para kazanır ama sistem kuramadığı için kaybeder.
</div>
</section>

<section>
<h2>Çözüm</h2>
<div class="card">
Finansal düşünceyi değiştir, sonucu değiştir.
</div>
</section>

<section>
<h2>İçerik</h2>
<div class="card">
Sermaye yönetimi, risk kontrolü, strateji, finansal zihin.
</div>
</section>

<div class="cta">
<h2>Bugün Başla</h2>
<button class="btn">Satın Al</button>
</div>

<script>
// dynamic sales text
const texts = [
"Parayı değil, sistemi öğren.",
"Sermayeni kontrol et, özgürlüğü kazan.",
"Finansal düşünceni yeniden kur.",
"Zenginlik bir sistemdir, şans değil."
];

let i = 0;
setInterval(()=>{
document.getElementById("dynamicText").style.opacity=0;
setTimeout(()=>{
i = (i+1)%texts.length;
document.getElementById("dynamicText").innerText = texts[i];
document.getElementById("dynamicText").style.opacity=1;
},300);
},2500);
</script>

</body>
</html>
