<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rove & Co. | Elite Financial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        /* Kapak Tasarımı */
        .book-cover { background: linear-gradient(135deg, #0f172a 0%, #000000 100%); position: relative; }
        .book-cover::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent 70%); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center max-w-6xl w-full mx-auto">
        <div class="text-2xl font-black tracking-widest text-white">ROVE & CO.</div>
        <div id="auth-status-area">
            <button onclick="toggleModal('auth-modal')" class="bg-white text-slate-950 font-bold px-5 py-2 rounded-full text-sm hover:bg-slate-200 transition">Giriş Yap / Kayıt Ol</button>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-6 text-center py-12 flex-grow flex flex-col justify-center items-center">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full text-left shadow-2xl">
            <!-- YENİ KAPAK -->
            <div class="book-cover h-48 rounded-xl mb-4 flex flex-col items-center justify-center border border-slate-700">
                <div class="w-12 h-12 border border-amber-500/50 rounded-full flex items-center justify-center mb-2"><span class="text-amber-500 font-bold text-xs">R&C</span></div>
                <h2 class="text-white font-bold tracking-widest text-sm uppercase">Finansal Okuryazarlık</h2>
            </div>
            <h3 class="text-lg font-bold text-white">Finansal Okuryazarlık Rehberi</h3>
            <button onclick="openBook()" class="w-full bg-slate-800 hover:bg-slate-700 mt-4 py-3 rounded-xl font-bold text-sm transition">İncele</button>
        </div>
    </main>

    <!-- Modallar -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white text-slate-900 p-8 rounded-2xl max-w-md w-full">
            <button onclick="toggleModal('auth-modal')" class="float-right text-xl">&times;</button>
            <h2 class="font-bold mb-4">Giriş Yap / Kayıt Ol</h2>
            <input type="email" id="auth-email" placeholder="E-posta" class="w-full p-3 border rounded-xl mb-3">
            <input type="password" id="auth-password" placeholder="Şifre" class="w-full p-3 border rounded-xl mb-3">
            <button onclick="handleAuth()" class="w-full bg-slate-950 text-white py-3 rounded-xl font-bold">Giriş Yap</button>
        </div>
    </div>

    <div id="book-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-8 rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto">
            <button onclick="toggleModal('book-modal')" class="float-right text-white">Kapat</button>
            <div id="book-content"></div>
            <div id="purchase-area" class="mt-6 pt-4 border-t border-slate-800 hidden">
                <a href="https://shopier.com" class="block w-full text-center bg-amber-500 text-black font-black py-4 rounded-xl">💳 TAM SÜRÜMÜ SATIN AL</a>
            </div>
        </div>
    </div>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('rove_user')) || null;
        
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            currentUser = (email === 'admin@rove.com' && password === 'rove2026') ? {role: 'admin'} : {role: 'user'};
            localStorage.setItem('rove_user', JSON.stringify(currentUser));
            toggleModal('auth-modal');
            alert("Giriş Başarılı!");
        }

        function openBook() {
            if (!currentUser) { toggleModal('auth-modal'); return; }
            const body = document.getElementById('book-content');
            const purchaseArea = document.getElementById('purchase-area');
            body.innerHTML = (currentUser.role === 'admin') ? '<h2 class="text-2xl font-black text-amber-500">👑 TAM ERİŞİM</h2>' : '<h3 class="text-xl font-bold">📖 ÖN İZLEME</h3><p class="text-slate-400">İçerik özeti...</p>';
            purchaseArea.style.display = (currentUser.role === 'admin') ? 'none' : 'block';
            toggleModal('book-modal');
        }
    </script>
</body>
</html>
