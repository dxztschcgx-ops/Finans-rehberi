<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROVE & CO. | Doğrulama</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans p-6">

    <!-- Ana Ekran -->
    <main class="max-w-md mx-auto">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] text-center shadow-2xl">
            <div class="h-40 bg-gradient-to-tr from-slate-800 to-black rounded-3xl mb-6 flex items-center justify-center border border-slate-700">
                <span class="text-2xl font-black">ROVE V1</span>
            </div>
            <h2 class="text-xl font-bold mb-4">Finansal Okuryazarlık</h2>
            <button onclick="checkAuth()" class="w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-amber-500 transition">İNCELE</button>
        </div>
    </main>

    <!-- Doğrulama Akışı -->
    <div id="modal-container" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <!-- Adım 1: E-posta -->
        <div id="step-1" class="bg-white text-black p-8 rounded-[2rem] w-full max-w-sm">
            <h2 class="font-bold text-xl mb-4">E-posta Doğrula</h2>
            <input id="email-input" type="email" placeholder="Gmail adresin" class="w-full p-4 bg-slate-100 rounded-2xl mb-3">
            <button onclick="sendCode()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">KOD GÖNDER</button>
        </div>
        
        <!-- Adım 2: Kod Girişi -->
        <div id="step-2" class="bg-white text-black p-8 rounded-[2rem] w-full max-w-sm hidden">
            <h2 class="font-bold text-xl mb-4">Kodunu Gir</h2>
            <p class="text-xs text-slate-500 mb-4" id="sent-to"></p>
            <input id="code-input" type="text" placeholder="Gelen kod" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 text-center tracking-widest text-xl">
            <button onclick="verifyCode()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">KAYDI TAMAMLA</button>
        </div>

        <!-- Adım 3: Kitap Özeti (Başarılı) -->
        <div id="step-3" class="bg-slate-900 text-white p-8 rounded-[2rem] w-full max-w-lg hidden text-left border border-slate-700">
            <h2 class="text-2xl font-bold text-amber-500 mb-4">Kayıt Başarılı!</h2>
            <p class="text-slate-400 mb-6 italic">"Finansal piyasalarda kalıcı olmanın yolu, sadece veriyi değil, sistemi yönetmektir."</p>
            <a href="https://shopier.com" class="block bg-amber-500 text-black text-center py-4 rounded-2xl font-black mb-4">TAM SÜRÜMÜ SATIN AL</a>
            <button onclick="location.reload()" class="w-full text-slate-600 text-xs underline">ÇIKIŞ YAP</button>
        </div>
    </div>

    <script>
        let generatedCode = "";

        function sendCode() {
            const email = document.getElementById('email-input').value;
            if(!email.endsWith('@gmail.com')) { alert("Lütfen geçerli bir Gmail gir!"); return; }
            
            generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
            alert("Simülasyon: Kodun " + generatedCode + " olarak oluşturuldu (Bunu kopyala).");
            
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('sent-to').innerText = email + " adresine gönderildi.";
        }

        function verifyCode() {
            const code = document.getElementById('code-input').value;
            if(code === generatedCode) {
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
                localStorage.setItem('auth', 'true');
            } else {
                alert("Hatalı kod!");
            }
        }

        function checkAuth() {
            if(localStorage.getItem('auth')) {
                document.getElementById('modal-container').classList.remove('hidden');
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
            } else {
                document.getElementById('modal-container').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
