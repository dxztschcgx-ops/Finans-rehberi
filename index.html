<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rove & Co. | Elite Financial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        /* Kapak Tasarımı */
        .book-cover {
            background: linear-gradient(135deg, #0f172a 0%, #000000 100%);
            position: relative;
            overflow: hidden;
        }
        .book-cover::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent 70%);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="p-6 flex justify-between items-center max-w-6xl w-full mx-auto">
        <div class="text-2xl font-black tracking-widest text-white">ROVE & CO.</div>
        <div id="auth-status-area"></div>
    </header>

    <main class="max-w-4xl mx-auto px-6 text-center py-12 flex-grow flex flex-col justify-center items-center">
        <h1 class="text-4xl md:text-6xl font-extrabold text-white tracking-tight mb-6">Finansal İmparatorluğunu İnşa Et</h1>
        
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-xs w-full text-left shadow-2xl">
            <div class="book-cover h-56 rounded-xl mb-4 flex flex-col items-center justify-center border border-slate-700 p-4 text-center">
                <div class="w-12 h-12 border border-amber-500/50 rounded-full flex items-center justify-center mb-4">
                    <span class="text-amber-500 font-bold text-xs">R&C</span>
                </div>
                <h2 class="text-white font-bold tracking-widest text-sm uppercase">Finansal Okuryazarlık</h2>
                <span class="text-[10px] text-slate-500 mt-2 tracking-widest uppercase italic">Premium Edition v1</span>
            </div>
            
            <h3 class="text-lg font-bold text-white mb-1">Finansal Okuryazarlık Rehberi</h3>
            <p class="text-xs text-slate-500 mb-4">Bütçe, Borsa, Kripto ve Girişimcilik Kaldıraçları</p>
            <button onclick="openBook()" class="w-full bg-white text-slate-950 font-bold py-3 rounded-xl text-sm hover:bg-slate-200 transition">İncele</button>
        </div>
    </main>

    <script>
        // Mevcut scriptlerin buraya gelecek...
        let currentUser = JSON.parse(localStorage.getItem('rove_user')) || null;
        function updateAuthUI() {
            const area = document.getElementById('auth-status-area');
            area.innerHTML = currentUser ? `<span class="text-xs text-slate-400">Hoş geldin!</span> <button onclick="location.reload()" class="text-xs text-red-500 ml-2">Çıkış</button>` : `<button onclick="toggleModal('auth-modal')" class="bg-white text-slate-950 font-bold px-5 py-2 rounded-full text-sm">Giriş Yap</button>`;
        }
        updateAuthUI();
    </script>
</body>
</html>
