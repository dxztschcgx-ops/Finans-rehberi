<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROVE & CO. | Premium Rehber</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans">

    <!-- Header -->
    <header class="p-8 max-w-lg mx-auto flex justify-between items-center">
        <h1 class="text-xl font-black tracking-widest">ROVE & CO.</h1>
        <button onclick="toggleModal('auth-modal')" class="text-xs font-bold border border-white/20 px-4 py-1.5 rounded-full hover:bg-white hover:text-black transition">GİRİŞ YAP</button>
    </header>

    <!-- Ana Kitap Kartı -->
    <main class="max-w-lg mx-auto p-6">
        <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl text-center">
            <div class="h-64 bg-gradient-to-br from-slate-800 to-black rounded-3xl mb-8 flex items-center justify-center border border-slate-700">
                <span class="text-slate-600 font-bold">ROVE FİNANS V1</span>
            </div>
            <h2 class="text-2xl font-bold mb-2">Finansal Okuryazarlık Rehberi</h2>
            <p class="text-slate-400 text-sm mb-8">Zenginliğin kodunu çözmek isteyenler için kapsamlı rehber.</p>
            <button onclick="openBook()" class="w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-amber-500 transition">REHBERİ İNCELE</button>
        </div>
    </main>

    <!-- Modallar -->
    <div id="auth-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white text-black p-8 rounded-[2rem] w-full max-w-sm">
            <h2 class="font-bold text-lg mb-6">Hesabına Giriş Yap</h2>
            <input id="email" type="email" placeholder="E-posta" class="w-full p-4 bg-slate-100 rounded-2xl mb-3">
            <button onclick="login()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="book-modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] w-full max-w-lg text-left">
            <h3 class="text-amber-500 text-2xl font-bold mb-4">Rehber İçeriği</h3>
            <p class="text-slate-300 mb-8">Bu rehber, finansal özgürlüğün anahtarıdır. Tüm bölümlere erişmek için tam sürümü alabilirsin.</p>
            <a href="https://shopier.com" class="block bg-amber-500 text-black text-center py-4 rounded-2xl font-black">TAM SÜRÜMÜ SATIN AL</a>
            <button onclick="toggleModal('book-modal')" class="mt-4 w-full text-slate-500 text-xs">KAPAT</button>
        </div>
    </div>

    <script>
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function login() { localStorage.setItem('user', 'active'); location.reload(); }
        function openBook() {
            if(!localStorage.getItem('user')) { toggleModal('auth-modal'); return; }
            toggleModal('book-modal');
        }
    </script>
</body>
</html>
