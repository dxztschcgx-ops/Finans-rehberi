<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROVE & CO. | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .terminal { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-amber-500 selection:text-black">

    <!-- Header -->
    <header class="p-8 flex justify-between items-center max-w-4xl mx-auto">
        <div class="text-2xl font-black tracking-tighter">ROVE<span class="text-amber-500">&</span>CO.</div>
        <button onclick="document.getElementById('auth-modal').classList.remove('hidden')" class="border border-white/20 px-6 py-2 rounded-full text-xs font-bold hover:bg-white hover:text-black transition">GİRİŞ YAP</button>
    </header>

    <main class="max-w-xl mx-auto p-6 text-center">
        <h1 class="text-4xl font-extrabold mb-6">Finansal Terminal</h1>
        
        <!-- Terminal Paneli -->
        <div class="glass p-6 rounded-[2rem] shadow-2xl mb-8 terminal text-left">
            <div class="flex gap-2 mb-4">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <div id="terminal-output" class="text-green-500 text-xs space-y-2 h-40 overflow-y-auto">
                <div>> Initializing Rove Core...</div>
                <div>> Connected to Binance TR node...</div>
                <div>> Fetching market data (KAT/USDT)...</div>
            </div>
            <button onclick="fetchData()" class="mt-4 w-full bg-green-900/30 border border-green-800 text-green-500 py-2 rounded-xl text-xs font-bold hover:bg-green-800 transition">VERİLERİ ÇEK</button>
        </div>

        <button onclick="openBook()" class="w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-amber-500 transition">REHBERİ İNCELE</button>
    </main>

    <!-- Modallar -->
    <div id="auth-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white text-black p-8 rounded-[2rem] w-full max-w-sm">
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="float-right text-2xl">×</button>
            <h2 class="font-bold text-xl mb-6">Sisteme Giriş</h2>
            <input id="email" type="email" placeholder="E-posta" class="w-full p-4 bg-slate-100 rounded-2xl mb-3">
            <button onclick="login()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="book-modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-slate-900 p-8 rounded-[2rem] w-full max-w-xl text-left">
            <h3 class="text-amber-500 text-2xl font-bold mb-4">Rehber Erişimi</h3>
            <p class="text-slate-300 mb-6 italic">Terminalden aldığın verileri, buradaki stratejilerle harmanlayarak botlarını optimize edebilirsin.</p>
            <a href="https://shopier.com" class="block bg-amber-500 text-black text-center py-4 rounded-2xl font-black">TAM SÜRÜMÜ SATIN AL</a>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="mt-4 w-full text-slate-500 text-xs">KAPAT</button>
        </div>
    </div>

    <script>
        function login() { localStorage.setItem('user', 'active'); location.reload(); }

        function fetchData() {
            const out = document.getElementById('terminal-output');
            out.innerHTML += `<div>> Fetching... <b>${(Math.random() * 100).toFixed(2)}%</b> update received.</div>`;
            out.scrollTop = out.scrollHeight;
        }

        function openBook() {
            if(!localStorage.getItem('user')) { document.getElementById('auth-modal').classList.remove('hidden'); return; }
            document.getElementById('book-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
